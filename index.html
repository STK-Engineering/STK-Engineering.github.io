<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전자 서명 생성기</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #8a8a8a;
        color: #1f2937;
      }

      .app {
        max-width: 1420px;
        margin: 0 auto;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        color: #ffffff;
      }

      .sub {
        margin: 0 0 24px;
        color: #ececec;
        line-height: 1.5;
      }

      .layout {
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 24px;
        align-items: start;
      }

      .panel {
        background: #fff;
        border: 1px solid #d8d8d8;
        padding: 20px;
      }

      .panel h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 13px;
        font-weight: 700;
        color: #374151;
      }

      input:not([type="checkbox"]),
      select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        outline: none;
        background: #fff;
      }

      input:not([type="checkbox"]):focus,
      select:focus {
        border-color: #2c3a74;
        box-shadow: 0 0 0 3px rgba(44, 58, 116, 0.12);
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: #1f3a6b;
        flex: none;
      }

      .field-note {
        margin: 0;
        font-size: 12px;
        color: #6b7280;
      }

      .contact-summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin: 2px 0 10px;
      }

      .contact-summary strong {
        color: #1f3a6b;
        font-size: 12px;
      }

      .contact-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .contact-item {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 10px;
        align-items: center;
      }

      .contact-item[hidden] {
        display: none !important;
      }

      .contact-choice {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 700;
        color: #374151;
        cursor: pointer;
      }

      .contact-label {
        line-height: 1.2;
      }

      .contact-item.inactive .contact-label {
        color: #9ca3af;
      }

      .contact-item.readonly-item .contact-label {
        color: #6b7280;
      }

      .contact-value:disabled {
        background: #f3f4f6;
        color: #9ca3af;
        cursor: not-allowed;
      }

      .contact-value[readonly] {
        background: #f3f4f6;
        color: #6b7280;
        border-color: #d1d5db;
      }

      .contact-value[readonly]:focus {
        border-color: #d1d5db;
        box-shadow: none;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .template-toggle {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .template-btn {
        border: 1px solid #d1d5db;
        background: #fff;
        color: #111827;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .template-btn.active {
        background: #1f3a6b;
        border-color: #1f3a6b;
        color: #fff;
      }

      button {
        border: 0;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: #2c4e86;
        color: #fff;
      }

      .ghost {
        background: #fff;
        color: #111827;
        border: 1px solid #d1d5db;
      }

      .hint {
        margin-top: 14px;
        font-size: 13px;
        color: #6b7280;
        line-height: 1.5;
      }

      .preview-wrap {
        background: #ffffff;
        border: 1px solid #d1d5db;
        padding: 20px;
        overflow: auto;
        min-height: 340px;
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        font-size: 14px;
        font-weight: 700;
      }

      .status.ok {
        color: #15803d;
      }

      .status.err {
        color: #b91c1c;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }

      .toolbar p {
        margin: 0;
        color: #6b7280;
        font-size: 13px;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .contact-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1 id="appHeading">전자 서명 생성</h1>
      <p class="sub" id="appSubtitle">
        이름, 부서, 직함과 연락처 항목을 입력하면 오른쪽 미리보기가 바뀌고 서명
        복사 버튼으로 Outlook 서명 편집창에 붙여넣을 수 있습니다.
      </p>

      <div class="layout">
        <section class="panel">
          <h2>입력 정보</h2>
          <div class="grid">
            <div class="field">
              <label for="name">이름</label>
              <input id="name" value="홍길동" />
            </div>

            <div class="field">
              <label for="depart">부서</label>
              <input id="depart" list="departOptions" value="IT/ISO" />
              <datalist id="departOptions">
                <option value="Part Sales"></option>
                <option value="Accounting/Affairs"></option>
                <option value="Engineering"></option>
                <option value="Factory&amp;Material Management"></option>
                <option value="IT/ISO"></option>
                <option value="Service Coordination"></option>
                <option value="Stucke Tech"></option>
              </datalist>
            </div>

            <div class="field">
              <label for="title">직함</label>
              <select id="titlePicker" aria-label="직함(한글) 선택">
                <option value="">직함 선택(한글)</option>
                <option value="Staff">사원</option>
                <option value="Assistant Manager">주임</option>
                <option value="Senior Manager">대리</option>
                <option value="Manager">과장</option>
                <option value="Deputy General Manager">차장</option>
                <option value="General Manager">부장</option>
                <option value="Director">이사</option>
                <option value="Managing Director">상무</option>
                <option value="Senior Managing Director">전무</option>
                <option value="CEO">대표</option>
              </select>
              <input id="title" value="Senior Manager" />
            </div>

            <div class="field full">
              <label>연락처</label>
              <div class="contact-summary">
                <p class="field-note" id="contactSummaryNote">
                  휴대폰, 대표번호, 팩스, 이메일 4개 항목
                </p>
                <strong id="contactSelectionCount">0/4 선택</strong>
              </div>
              <div class="contact-list">
                <div class="contact-item" data-contact-item="mobile">
                  <label class="contact-choice" for="contact-mobile-enabled">
                    <input
                      id="contact-mobile-enabled"
                      type="checkbox"
                      data-contact-toggle="mobile"
                      checked
                    />
                    <span class="contact-label" data-contact-label="mobile">
                      M.
                    </span>
                  </label>
                  <input class="contact-value" id="mobile" value="010 1234 5678" />
                </div>

                <div
                  class="contact-item readonly-item"
                  data-contact-item="mainPhone"
                >
                  <label class="contact-choice" for="contact-mainPhone-enabled">
                    <input
                      id="contact-mainPhone-enabled"
                      type="checkbox"
                      data-contact-toggle="mainPhone"
                      checked
                    />
                    <span class="contact-label" data-contact-label="mainPhone">
                      T.
                    </span>
                  </label>
                  <input
                    class="contact-value"
                    id="mainPhone"
                    value="+82 (0)10 0000 1179"
                    readonly
                  />
                </div>

                <div class="contact-item" data-contact-item="directPhone" hidden>
                  <label class="contact-choice" for="contact-directPhone-enabled">
                    <input
                      id="contact-directPhone-enabled"
                      type="checkbox"
                      data-contact-toggle="directPhone"
                    />
                    <span class="contact-label" data-contact-label="directPhone">
                      D.
                    </span>
                  </label>
                  <input
                    class="contact-value"
                    id="directPhone"
                    value="+82 (0)70 5118 3990"
                  />
                </div>

                <div class="contact-item readonly-item" data-contact-item="fax">
                  <label class="contact-choice" for="contact-fax-enabled">
                    <input
                      id="contact-fax-enabled"
                      type="checkbox"
                      data-contact-toggle="fax"
                    />
                    <span class="contact-label" data-contact-label="fax">
                      F.
                    </span>
                  </label>
                  <input
                    class="contact-value"
                    id="fax"
                    value="+82 (0)51 980 0565"
                    readonly
                  />
                </div>

                <div class="contact-item" data-contact-item="email">
                  <label class="contact-choice" for="contact-email-enabled">
                    <input
                      id="contact-email-enabled"
                      type="checkbox"
                      data-contact-toggle="email"
                      checked
                    />
                    <span class="contact-label" data-contact-label="email">
                      E.
                    </span>
                  </label>
                  <input class="contact-value" id="email" value="stk@stk-eng.com" />
                </div>
              </div>
            </div>
          </div>

          <div class="template-toggle">
            <button
              type="button"
              class="template-btn active"
              data-template="type1"
              aria-pressed="true"
            >
              서명란 1
            </button>
            <button
              type="button"
              class="template-btn"
              data-template="type2"
              aria-pressed="false"
            >
              서명란 2
            </button>
          </div>

          <div class="actions">
            <button class="primary" id="copySignatureBtn">서명 복사</button>
            <button class="ghost" id="resetBtn">기본값으로 초기화</button>
          </div>

          <div id="status" class="status"></div>

          <p class="hint" id="appHint"> </p>
        </section>

        <section class="panel">
          <div class="toolbar">
            <h2 style="margin: 0">미리보기</h2>
            <p>이 영역이 그대로 복사됩니다.</p>
          </div>

          <div class="preview-wrap">
            <div id="signaturePreview"></div>
          </div>
        </section>
      </div>
    </div>

    <script>

        const trimmed = (url || "").trim();
        if (!trimmed) return "";
        if (/^(https?:\/\/|mailto:|data:|blob:|file:)/i.test(trimmed)) {
          return trimmed;
        }
        return new URL(trimmed, window.location.href).href;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function normalizeUrl(url) {
        const trimmed = (url || "").trim();
        if (!trimmed) return "";
        if (/^https?:\/\//i.test(trimmed) || /^mailto:/i.test(trimmed)) {
          return trimmed;
        }
        return "https://" + trimmed;
      }

      function normalizeContactValue(key, value) {
        const trimmed = String(value || "").trim();
        if (!NUMBER_CONTACT_KEYS.has(key)) return trimmed;
        return trimmed.replace(/-/g, " ").replace(/\s+/g, " ");

        if (lowered.endsWith(".gif")) return "image/gif";
        if (lowered.endsWith(".svg")) return "image/svg+xml";
        if (lowered.endsWith(".webp")) return "image/webp";
        return "image/png";
      }

      async function imageUrlToDataUrl(url) {
        const resolvedUrl = resolveAssetUrl(url);
        if (!resolvedUrl || /^data:/i.test(resolvedUrl)) return resolvedUrl;

        if (!imageDataUrlCache.has(resolvedUrl)) {
          imageDataUrlCache.set(
            resolvedUrl,
            new Promise((resolve) => {
              const img = new Image();

              img.onload = () => {
                try {
                  const canvas = document.createElement("canvas");
                  canvas.width = img.naturalWidth || img.width;
                  canvas.height = img.naturalHeight || img.height;

                  const ctx = canvas.getContext("2d");
                  if (!ctx) {
                    resolve(resolvedUrl);
                    return;
                  }

                  ctx.drawImage(img, 0, 0);
                  resolve(canvas.toDataURL(getImageMimeType(resolvedUrl)));
                } catch (error) {
                  resolve(resolvedUrl);
                }
              };

              img.onerror = () => resolve(resolvedUrl);
              img.src = resolvedUrl;
            }),
          );
        }

        return imageDataUrlCache.get(resolvedUrl);
      }

      async function buildClipboardHtml(data, variant = "type1") {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = buildSignatureHtml(data, variant);

        const images = Array.from(wrapper.querySelectorAll("img"));
        await Promise.all(
          images.map(async (img) => {
            const src = img.getAttribute("src");
            const inlinedSrc = await imageUrlToDataUrl(src);
            if (inlinedSrc) {
              img.setAttribute("src", inlinedSrc);
            }
          }),
        );

        return wrapper.innerHTML.trim();
      }

      function renderDepartmentOptions() {
        const options = departmentOptions.map((value) => {
          const option = document.createElement("option");
          option.value = value;
          return option;
        });
        departOptions.replaceChildren(...options);
      }

      function applyDefaults() {
        Object.entries(defaults).forEach(([key, value]) => {
          if (fields[key]) {
            fields[key].value = normalizeContactValue(key, value);
          }
        });

        CONTACT_FIELDS.forEach(({ key }) => {
          if (contactToggles[key]) {
            contactToggles[key].checked =
              defaultSelectedContacts.includes(key) ||
              (key === "directPhone" && signatureVariant === "type2");
          }
        });

        updateContactControls();
      }

      function getData() {
        return {
          ...Object.fromEntries(
            Object.entries(fields).map(([key, el]) => [
              key,
              normalizeContactValue(key, el.value),
            ]),
          ),
          activeContacts: getAvailableContactFields().filter(
            ({ key }) => contactToggles[key] && contactToggles[key].checked,
          ).map(({ key }) => key),
        };
      }

      function updateContactControls() {
        const availableContactFields = getAvailableContactFields();
        const selectedCount = availableContactFields.filter(
          ({ key }) => contactToggles[key] && contactToggles[key].checked,
        ).length;
        const limitReached = selectedCount >= MAX_CONTACT_SELECTIONS;

        if (contactSummaryNote) {
          contactSummaryNote.textContent =
            signatureVariant === "type2"
              ? "휴대폰, 대표번호, 직통번호, 팩스, 이메일 중 최대 4개 선택"
              : "휴대폰, 대표번호, 팩스, 이메일 4개 항목";
        }

        if (contactSelectionCount) {
          contactSelectionCount.textContent = `${selectedCount}/${MAX_CONTACT_SELECTIONS} 선택`;
        }

        CONTACT_FIELDS.forEach(({ key }) => {
          const toggle = contactToggles[key];
          const input = fields[key];
          const item = contactItems[key];
          const isAvailable = isContactAvailable(key);
          const isSelected = isAvailable && !!toggle?.checked;

          if (input) {
            input.disabled = !isSelected;
          }

          if (item) {
            item.hidden = !isAvailable;
            item.classList.toggle("inactive", !isSelected);
          }

          if (toggle) {
            toggle.disabled = !isAvailable || (!isSelected && limitReached);
          }
        });
      }

      function renderContactFieldLabels() {
        const useLongLabel = signatureVariant === "type2";

        CONTACT_FIELDS.forEach(({ key, shortLabel, longLabel }) => {
          if (contactLabelEls[key]) {
            contactLabelEls[key].textContent = useLongLabel
              ? longLabel
              : shortLabel;
          }
        });
      }

      function buildIconBlock(iconUrl, iconTextHtml, s) {
        if (!iconUrl && !iconTextHtml) return "&nbsp;";

        const iconCell = iconUrl
          ? `<td style="width:${s(90)}px; min-width:${s(90)}px; padding-right:${s(
              4,
            )}px; vertical-align:middle;">
               <img src="${escapeHtml(
                 iconUrl,
               )}" alt="" width="${s(90)}" style="display:block; width:${s(
                 90,
               )}px; min-width:${s(90)}px; height:auto; max-width:none; border:0;">
             </td>`
          : "";

        const textCell = iconTextHtml
          ? `<td style="vertical-align:middle; width:100%; font-size:${s(
              15,
            )}px; font-weight:700; color:#4f5f79; line-height:1.15; white-space:nowrap;">
               ${iconTextHtml}
             </td>`
          : "";

        return `
          <table cellpadding="0" cellspacing="0" border="0" style="width:100%; border-collapse:collapse; white-space:nowrap;">
            <tr>
              ${iconCell}${textCell}
            </tr>
          </table>
        `.trim();
      }

      function buildSignatureHtml(data, variant = "type1") {
        const websiteUrl = normalizeUrl(FIXED.website);
        const SCALE = 0.63;
        const s = (value) => Math.max(1, Math.round(value * SCALE));
        const isType2 = variant === "type2";
        const labelWidth = isType2 ? s(58) : s(28);
        const labelPad = isType2 ? s(8) : s(10);
        const contactLineHeight = 1.2;
        const metaLine = [data.depart, data.title].filter(Boolean).join(" | ");
        const renderedContacts = CONTACT_FIELDS.filter(({ key }) =>
          (data.activeContacts || []).includes(key),
        )
          .map((meta) => ({
            ...meta,
            value: (data[meta.key] || "").trim(),
          }))
          .filter(({ value }) => value);
        const contactFontSize = s(renderedContacts.length === 3 ? 19 : 16);
        const rowGap = s(renderedContacts.length === 3 ? 9 : 6);
        const contactRowsHtml = renderedContacts
          .map((contact, index) => {
            const label = isType2 ? contact.longLabel : contact.shortLabel;
            const bottomPad = index === renderedContacts.length - 1 ? 0 : rowGap;
            const valueHtml = contact.hrefPrefix
              ? `<a href="${escapeHtml(
                  `${contact.hrefPrefix}${contact.value}`,
                )}" style="color:#4f5f79; text-decoration:none;">${escapeHtml(
                  contact.value,
                )}</a>`
              : escapeHtml(contact.value);

            return `<tr>
                      <td style="width:${labelWidth}px; font-weight:700; color:#3b3a71; padding:0 ${labelPad}px ${bottomPad}px 0; white-space:nowrap;">${label}</td>
                      <td style="padding:0 0 ${bottomPad}px 0; white-space:nowrap;">${valueHtml}</td>
                    </tr>`;
          })
          .join("");
        const nameHtml = (() => {
          const raw = (data.name || "").trim();
          if (!raw) return "";

          const ls = "0.5em";

          if (/^[A-Za-z][A-Za-z .'-]*$/.test(raw)) {
            return escapeHtml(raw);
          }

          if (/\s/.test(raw)) {
            const parts = raw.split(/\s+/).filter(Boolean);
            if (parts.length <= 1) {
              return `<span style="letter-spacing:${ls};">${escapeHtml(
                raw,
              )}</span>`;
            }

            const head = parts.slice(0, -1).join(" ");
            const tail = parts[parts.length - 1];
            return `<span style="letter-spacing:${ls};">${escapeHtml(
              head,
            )}</span><span style="letter-spacing:0;"> ${escapeHtml(
              tail,
            )}</span>`;
          }

          if (raw.length <= 2) {
            return `<span style="letter-spacing:${ls};">${escapeHtml(
              raw,
            )}</span>`;
          }

          const head = raw.slice(0, -1);
          const tail = raw.slice(-1);
          return `<span style="letter-spacing:${ls};">${escapeHtml(
            head,
          )}</span><span style="letter-spacing:0;">${escapeHtml(tail)}</span>`;
        })();
        const rightTableW = s(835);
        const rightColGap = s(20);
        const rightColLeft = s(260);
        const rightColRight = Math.max(
          1,
          rightTableW - rightColLeft - rightColGap,
        );
        const logoWidth = s(370);
        const outerLeftColWidth = logoWidth;
        const outerTableWidth =
          outerLeftColWidth + s(12) + s(18) + rightTableW + s(12);
        const disclaimerHtml = escapeHtml(FIXED.disclaimer).replace(
          /\n/g,
          "<br>",
        );
        const disclaimerImageUrl = FIXED.disclaimerImage || FIXED.background;
        const disclaimerImageWidth = s(835);
        const disclaimerBlockHtml = disclaimerImageUrl
          ? `<table cellpadding="0" cellspacing="0" border="0" style="width:${disclaimerImageWidth}px; min-width:${disclaimerImageWidth}px; max-width:none; border-collapse:collapse; white-space:nowrap;">
               <tr>
                 <td style="padding:0;">
                   <img src="${escapeHtml(
                     disclaimerImageUrl,
                   )}" alt="" width="${disclaimerImageWidth}" style="display:block; width:${disclaimerImageWidth}px; min-width:${disclaimerImageWidth}px; max-width:none; height:auto; border:0; outline:none; text-decoration:none; -ms-interpolation-mode:bicubic;">
                 </td>
               </tr>
             </table>`
          : `<div style="padding:${s(10)}px ${s(
              14,
            )}px; font-size:${s(10)}px; line-height:1.3; color:#dad7d4; background:#5d5754;">
               ${disclaimerHtml}
             </div>`;
        const address1Html = escapeHtml(FIXED.address1).replace(/\n/g, " / ");
        const address2Html = escapeHtml(FIXED.address2).replace(/\n/g, " / ");
        const icon1TextHtml = FIXED.icon1Text
          ? escapeHtml(FIXED.icon1Text).replace(/\n/g, "<br>")
          : "";
        const icon2TextHtml = FIXED.icon2Text
          ? escapeHtml(FIXED.icon2Text).replace(/\n/g, "<br>")
          : "";
        const icon3TextHtml = FIXED.icon3Text
          ? escapeHtml(FIXED.icon3Text).replace(/\n/g, "<br>")
          : "";

        return `
<table cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" width="${s(
          outerTableWidth,
        )}"
  style="background-color:#ffffff; border-collapse:collapse; width:${outerTableWidth}px; min-width:${outerTableWidth}px; max-width:none; white-space:nowrap; word-break:keep-all;">
  <tr>
    <td bgcolor="#ffffff"
      style="background-color:#ffffff; padding:0;">
<table cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" width="${s(
          outerTableWidth,
        )}"
  style="width:${outerTableWidth}px; min-width:${outerTableWidth}px; max-width:none; border-collapse:collapse; font-family:Arial, Helvetica, sans-serif; background-color:#ffffff; color:#46597a; white-space:nowrap; word-break:keep-all;">
        <tr>
          <td width="${outerLeftColWidth}" style="width:${outerLeftColWidth}px; min-width:${outerLeftColWidth}px; vertical-align:top; padding:${s(
            20,
          )}px ${s(18)}px ${s(12)}px ${s(12)}px;">
            ${
              FIXED.logo
                ? `<img src="${escapeHtml(
                    FIXED.logo,
                  )}" alt="Company Logo" width="${logoWidth}" style="display:block; width:${logoWidth}px; min-width:${logoWidth}px; height:auto; max-width:none; border:0;">`
                : ""
            }

            <table cellpadding="0" cellspacing="0" border="0" width="${logoWidth}" style="width:${logoWidth}px; min-width:${logoWidth}px; margin-top:${s(
              20,
            )}px; font-size:${s(19)}px; color:#9a9a9a; white-space:nowrap;">
              <tr>
                <td style="text-align:left; white-space:nowrap;">
                  ${escapeHtml(FIXED.company)}
                </td>
                <td style="text-align:right; white-space:nowrap;">
                  <a href="${escapeHtml(
                    websiteUrl,
                  )}" style="color:#9a9a9a; text-decoration:none;">
                    ${escapeHtml(FIXED.website)}
                  </a>
                </td>
              </tr>
            </table>
          </td>

          <td width="${rightTableW}" style="width:${rightTableW}px; min-width:${rightTableW}px; vertical-align:top; padding:${s(18)}px 0 0 ${s(12)}px;">
            <table cellpadding="0" cellspacing="0" border="0" width="${s(
              835,
            )}" style="width:${rightTableW}px; min-width:${rightTableW}px; max-width:none; border-collapse:collapse; table-layout:fixed; mso-table-lspace:0pt; mso-table-rspace:0pt; white-space:nowrap;">
              <colgroup>
                <col width="${rightColLeft}">
                <col width="${rightColGap}">
                <col width="${rightColRight}">
              </colgroup>

              <tr>
                <td colspan="3" style="padding:0 0 ${s(
                  10,
                )}px 0; overflow:hidden;">
                  <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                    <span style="font-size:${s(
                      20,
                    )}px; font-weight:bold; color:#222; white-space:nowrap; padding-right: 5px">
                      ${nameHtml}
                    </span>
                    ${
                      metaLine
                        ? `<span style="color:#666; font-size:${s(
                            16,
                          )}px; white-space:nowrap;">${escapeHtml(metaLine)}</span>`
                        : ""
                    }
                  </div>
                </td>
              </tr>

              <tr>
                <td width="${rightColLeft}" style="vertical-align:top; width:${rightColLeft}px; min-width:${rightColLeft}px; overflow:hidden; mso-width-source:userset;">
                  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; font-size:${contactFontSize}px; color:#5a6475; line-height:${contactLineHeight}; white-space:nowrap;">
                    ${contactRowsHtml}
                  </table>
                </td>

                <td width="${rightColGap}" style="width:${rightColGap}px; min-width:${rightColGap}px; font-size:1px; line-height:1px;">
                  &nbsp;
                </td>

                <td width="${rightColRight}" style="width:${rightColRight}px; min-width:${rightColRight}px; vertical-align:bottom; mso-width-source:userset;">
                  <table cellpadding="0" cellspacing="0" border="0" align="left" width="${rightColRight}" style="width:${rightColRight}px; min-width:${rightColRight}px; max-width:none; border-collapse:collapse; table-layout:fixed; mso-table-lspace:0pt; mso-table-rspace:0pt; white-space:nowrap;">
                    <tr>
                      <td width="${s(80)}" style="width:${s(
                        80,
                      )}px; min-width:${s(80)}px; vertical-align:bottom; text-align:left;">
                        ${
                          FIXED.qr
                            ? `<img src="${escapeHtml(
                                FIXED.qr,
                              )}" alt="QR Code" width="${s(
                                70,
                              )}" style="display:block; width:${s(
                                70,
                              )}px; min-width:${s(70)}px; height:auto; max-width:none; border:0; margin:0;">`
                            : ""
                        }
                      </td>

                      <td width="${s(40)}" style="width:${s(
                        40,
                      )}px; min-width:${s(40)}px; font-size:1px; line-height:1px;">
                        &nbsp;
                      </td>

                      <td style="vertical-align:bottom;">
                        <table cellpadding="0" cellspacing="0" border="0" width="100%" align="left" style="width:100%; border-collapse:collapse; mso-table-lspace:0pt; mso-table-rspace:0pt; white-space:nowrap;">
                          <tr>
                            <td style="width:33.333%; vertical-align:bottom; padding-right:${s(
                              5,
                            )}px;">
                              ${buildIconBlock(FIXED.icon1, icon1TextHtml, s)}
                            </td>
                            <td style="width:33.333%; vertical-align:bottom; padding-right:${s(
                              3,
                            )}px;">
                              ${buildIconBlock(FIXED.icon2, icon2TextHtml, s)}
                            </td>
                            <td style="width:33.333%; vertical-align:bottom;">
                              ${buildIconBlock(FIXED.icon3, icon3TextHtml, s)}
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

            <table cellpadding="0" cellspacing="0" border="0" width="${rightTableW}" style="width:${rightTableW}px; min-width:${rightTableW}px; max-width:none; border-collapse:collapse; margin-top:${s(8)}px; white-space:nowrap;">
              <tr>
                <td>
                  <div style="border-top:1px solid #cfd3da; font-size:1px; line-height:1px;">&nbsp;</div>
                </td>
              </tr>

            <table cellpadding="0" cellspacing="0" border="0" width="${rightTableW}" style="width:${rightTableW}px; min-width:${rightTableW}px; margin-bottom:${s(5)}px; border-collapse:collapse; font-size:${s(
              12,
            )}px; max-width:none; color:#8c8c8c; margin-top:${s(8)}px; white-space:nowrap;">
              <tr>
                <td style="vertical-align:top; text-align:left; padding-left:${s(
                  5,
                )}px; line-height:1.3; white-space:nowrap;">
                  <span style="color:#9a9a9a; display:block; margin-bottom:${s(
                    3,
                  )}px; white-space:nowrap;">Office.
                  ${address1Html}</span>
                </td>
              </tr>
              <tr>
                <td style="vertical-align:top; text-align:left; padding-left:${s(
                  5,
                )}px; line-height:1.3; padding-top:${s(2)}px; white-space:nowrap;">
                  <span style="color:#9a9a9a; display:block; margin-bottom:${s(
                    3,
                  )}px; white-space:nowrap;">Factory.
                  ${address2Html}
                  </span>
                </td>
              </tr>
            </table>

            <table cellpadding="0" cellspacing="0" border="0" width="${rightTableW}" style="width:${rightTableW}px; min-width:${rightTableW}px; max-width:none; border-collapse:collapse; white-space:nowrap;">
              <tr>
                <td style="padding:0;">
                  ${disclaimerBlockHtml}
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>`.trim();
      }

      function renderPreview() {
        updateContactControls();
        const data = getData();
        renderContactFieldLabels();
        preview.innerHTML = buildSignatureHtml(data, signatureVariant);
        status.textContent = "";
        status.className = "status";

        if (titlePicker) {
          const t = (fields.title.value || "").trim();
          const hasOption = Array.from(titlePicker.options).some(
            (opt) => opt.value === t,
          );
          titlePicker.value = hasOption ? t : "";
        }
      }

      async function copyRichHtml() {
        const html = await buildClipboardHtml(getData(), signatureVariant);
        const plainText = preview.innerText || preview.textContent || "";

        if (navigator.clipboard && window.ClipboardItem) {
          const item = new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([plainText], { type: "text/plain" }),
          });
          await navigator.clipboard.write([item]);
          return true;
        }

        const temp = document.createElement("div");
        temp.setAttribute("aria-hidden", "true");
        temp.style.position = "fixed";
        temp.style.left = "-99999px";
        temp.style.top = "0";
        temp.innerHTML = html;
        document.body.appendChild(temp);

        const range = document.createRange();
        range.selectNode(temp);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        const ok = document.execCommand("copy");
        selection.removeAllRanges();
        temp.remove();
        return ok;
      }

      function setStatus(message, ok = true) {
        status.textContent = message;
        status.className = ok ? "status ok" : "status err";
      }

      renderDepartmentOptions();
      applyDefaults();

      Object.entries(fields).forEach(([key, el]) => {
        el.addEventListener("input", () => {
          const normalizedValue = normalizeContactValue(key, el.value);
          if (el.value !== normalizedValue) {
            el.value = normalizedValue;
          }
          renderPreview();
        });
      });

      CONTACT_FIELDS.forEach(({ key }) => {
        const toggle = contactToggles[key];
        if (!toggle) return;

        toggle.addEventListener("change", () => {
          updateContactControls();
          renderPreview();
        });
      });

      if (titlePicker) {
        titlePicker.addEventListener("change", () => {
          if (titlePicker.value) {
            fields.title.value = titlePicker.value;
          }
          renderPreview();
        });
      }

      templateButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const nextVariant = btn.dataset.template || "type1";

          if (nextVariant === "type1" && contactToggles.directPhone) {
            contactToggles.directPhone.checked = false;
          }

          if (
            nextVariant === "type2" &&
            contactToggles.directPhone &&
            !contactToggles.directPhone.checked
          ) {
            const selectedCount = CONTACT_FIELDS.filter(
              ({ key }) =>
                key !== "directPhone" &&
                isContactAvailable(key, nextVariant) &&
                contactToggles[key] &&
                contactToggles[key].checked,
            ).length;

            if (selectedCount < MAX_CONTACT_SELECTIONS) {
              contactToggles.directPhone.checked = true;
            }
          }

          signatureVariant = nextVariant;
          templateButtons.forEach((el) => {
            const active = el === btn;
            el.classList.toggle("active", active);
            el.setAttribute("aria-pressed", active ? "true" : "false");
          });
          renderPreview();
        });
      });

      document
        .getElementById("copySignatureBtn")
        .addEventListener("click", async () => {
          try {
            const ok = await copyRichHtml();
            if (!ok) throw new Error("copy failed");
            setStatus(
              "서명이 복사되었습니다. Outlook 서명 편집창에 붙여넣으세요.",
            );
          } catch (error) {
            setStatus("복사에 실패했습니다. 다시 시도해 주세요.", false);
          }
        });

      document.getElementById("resetBtn").addEventListener("click", () => {
        applyDefaults();
        renderPreview();
        setStatus("기본값으로 초기화했습니다.");
      });

      renderPreview();
    </script>
  </body>
</html>
