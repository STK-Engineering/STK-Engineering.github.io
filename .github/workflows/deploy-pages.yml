name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate runtime config
        env:
          APP_TITLE: ${{ vars.APP_TITLE }}
          APP_HEADING: ${{ vars.APP_HEADING }}
          APP_SUBTITLE: ${{ vars.APP_SUBTITLE }}
          APP_HINT: ${{ vars.APP_HINT }}
          DEFAULT_NAME: ${{ vars.DEFAULT_NAME }}
          DEFAULT_DEPART: ${{ vars.DEFAULT_DEPART }}
          DEFAULT_TITLE: ${{ vars.DEFAULT_TITLE }}
          DEFAULT_MOBILE: ${{ vars.DEFAULT_MOBILE }}
          DEFAULT_PHONE: ${{ vars.DEFAULT_PHONE }}
          DEFAULT_EMAIL: ${{ vars.DEFAULT_EMAIL }}
          LOGO_URL: ${{ vars.LOGO_URL }}
          QR_URL: ${{ vars.QR_URL }}
          ICON1_URL: ${{ vars.ICON1_URL }}
          ICON2_URL: ${{ vars.ICON2_URL }}
          ICON3_URL: ${{ vars.ICON3_URL }}
          DISCLAIMER_IMAGE_URL: ${{ vars.DISCLAIMER_IMAGE_URL }}
          COMPANY_NAME: ${{ vars.COMPANY_NAME }}
          WEBSITE: ${{ vars.WEBSITE }}
          FAX: ${{ vars.FAX }}
          ADDRESS1: ${{ vars.ADDRESS1 }}
          ADDRESS2: ${{ vars.ADDRESS2 }}
          ICON1_TEXT: ${{ vars.ICON1_TEXT }}
          ICON2_TEXT: ${{ vars.ICON2_TEXT }}
          ICON3_TEXT: ${{ vars.ICON3_TEXT }}
          DISCLAIMER: ${{ vars.DISCLAIMER }}
          DEPARTMENT_OPTIONS: ${{ vars.DEPARTMENT_OPTIONS }}
        run: node scripts/generate-config.mjs

      - name: Prepare site
        run: |
          mkdir dist
          cp mail.html dist/index.html
          cp mail.config.js dist/mail.config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
